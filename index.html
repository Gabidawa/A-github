<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>GitHub működése</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d1117;
  color: white;
  text-align: center;
}

header {
  padding: 20px;
  background: #161b22;
  font-size: 28px;
  font-weight: bold;
}

.section {
  margin: 30px;
  padding: 20px;
  background: #21262d;
  border-radius: 10px;
  transition: 0.3s;
}

.section:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px #58a6ff;
}

button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  background: #238636;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2ea043;
}

#log {
  margin-top: 20px;
  background: black;
  padding: 10px;
  height: 150px;
  overflow-y: auto;
  text-align: left;
  font-family: monospace;
}
</style>

</head>
<body>

<header>💻 GitHub működése (interaktív)</header>

<div class="section">
  <h2>📦 Mi az a repository?</h2>
  <p>Ez egy projekt tároló, ahol a kódod van.</p>
</div>

<div class="section">
  <h2>📝 Commit</h2>
  <p>Változtatások mentése.</p>
  <button onclick="commit()">Commit</button>
</div>

<div class="section">
  <h2>🚀 Push</h2>
  <p>Feltöltés a GitHub szerverre.</p>
  <button onclick="push()">Push</button>
</div>

<div class="section">
  <h2>🌿 Branch</h2>
  <p>Külön fejlesztési ág.</p>
  <button onclick="branch()">Új branch</button>
</div>

<div id="log"></div>

<script>
let hasCommit = false;

function log(message) {
  const logBox = document.getElementById("log");
  logBox.innerHTML += "> " + message + "<br>";
  logBox.scrollTop = logBox.scrollHeight;
}

function commit() {
  hasCommit = true;
  log("✔ Commit sikeres");
}

function push() {
  if (hasCommit) {
    log("🚀 Push a GitHub-ra");
  } else {
    log("⚠ Előbb commitolj!");
  }
}

function branch() {
  log("🌿 Új branch létrehozva");
}
</script>

</body>
</html>
